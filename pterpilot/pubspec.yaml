name: pterpilot
description: PterPilot - 面向PT玩家的一站式移动端管理工具
publish_to: 'none'
version: 0.1.0

platforms:
  android:
  ios:
  ohos:

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
